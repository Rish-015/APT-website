<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lato', sans-serif;
        }
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: black;
            color: white;
            padding: 20px;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 60px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: white;
            text-shadow: 0px 0px 10px rgba(255, 255, 255, 0.5);
            position: relative;
        }
        h1::after {
            content: "";
            display: block;
            width: 80px;
            height: 3px;
            background: white;
            margin: 10px auto 0;
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        .result-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            height: 100%;
            border-radius: 12px;
            width: 73%;
            max-width: 500px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease-in-out;
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: static;
            overflow: auto;
        }
        .result-container:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            height: max-content;
        }
        .result-container::before {
            content: "";
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 2px solid white;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            opacity: 0.1;
        }
        img {
            width: 100%;
            max-width: 300px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(255, 255, 255, 0.3);
            margin-bottom: 15px;
        }
        .result {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0px 0px 8px rgba(255, 255, 255, 0.5);
        }
        p {
            font-size: 20px;
            font-weight: 400;
            color: #ddd;
            margin: 5px 0;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s ease-in-out;
            box-shadow: 0px 8px 20px rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: black;
            color: white;
            border: 2px solid white;
            transform: scale(1.05);
            box-shadow: 0px 0px 10px rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <h1>Prediction Result</h1>
    <div class="result-container">
        <img src="{{ url_for('static', filename='upload/' + user_image) }}" alt="Uploaded Leaf">
        <p class="result">Predicted Disease: <strong>{{ disease }}</strong></p>
        <p>Remedy: <strong>{{ remedy }}</strong></p>
    </div>
    <a href="/" class="btn">🔄 Upload Another Image</a>
</body>
</html>
