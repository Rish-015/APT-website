<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Prediction</title>
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container-fluid text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="content-box">
                    <h1 class="mb-4">🌱 AI-Based Crop Prediction</h1>
                    <p>Enter soil and weather parameters to get the best crop suggestion.</p>

                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6">
                                <label>Nitrogen (N):</label>
                                <input type="number" name="N" step="0.1" class="form-control" required>
                                
                                <label>Phosphorus (P):</label>
                                <input type="number" name="P" step="0.1" class="form-control" required>
                                
                                <label>Potassium (K):</label>
                                <input type="number" name="K" step="0.1" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label>Soil pH:</label>
                                <input type="number" name="pH" step="0.1" class="form-control" required>
                                
                                <label>Rainfall (mm):</label>
                                <input type="number" name="rainfall" step="0.1" class="form-control" required>
                                
                                <label>Temperature (°C):</label>
                                <input type="number" name="temperature" step="0.1" class="form-control" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success mt-3">🌾 Predict Crop</button>
                    </form>

                    {% if prediction %}
                    <div class="result mt-4">
                        <h3>🌾 Recommended Crop: <strong>{{ prediction }}</strong></h3>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
