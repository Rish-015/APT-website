<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            text-align: center;
            color: white;
            padding: 20px;
        }
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            position: relative;
            color: white;
            text-shadow: 0px 0px 8px rgba(255, 255, 255, 0.5);
        }
        h1::after {
            content: "";
            display: block;
            width: 90px;
            height: 4px;
            background: white;
            margin: 10px auto 0;
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        p {
            font-size: 18px;
            font-weight: 400;
            color: #ddd;
            margin-bottom: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            width: 60%;
            max-width: 450px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease-in-out;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }
        .container:hover {
            transform: scale(1.03);
        }
        label {
            font-size: 18px;
            font-weight: 600;
            display: block;
            background: white;
            color: black;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            width: fit-content;
            margin: 10px auto;
        }
        label:hover {
            background: black;
            color: white;
            border: 2px solid white;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s ease-in-out;
            box-shadow: 0px 8px 20px rgba(255, 255, 255, 0.3);
            border: 2px solid white;
        }
        .btn:hover {
            background: black;
            color: white;
            border: 2px solid white;
            transform: scale(1.05);
        }

    </style>
</head>
<body>
    <h1>Plant Disease Detector</h1>
    <p>Upload a leaf image to detect the disease and get remedies</p>
    <div class="container">
        <form action="/predict" method="POST" enctype="multipart/form-data">
            <label for="file">📂 Choose Image</label>
            <input type="file" id="file" name="image" required>
            <br>
            <input type="submit" class="btn" value="🔍 Predict">
        </form>
    </div>
</body>
</html>
